name: Build & Release APK

on:
  push:
    tags:
      - 'v*' # Trigger workflow when pushing tags matching v*, e.g., v1.1.1

permissions:
  contents: write # Required to create release and upload assets

jobs:
  build:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK for Release Artifact
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/RockyFilmTV-${{ github.ref_name }}.apk

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/RockyFilmTV-${{ github.ref_name }}.apk
          name: RockyFilmTV ${{ github.ref_name }}
          body: |
            ## Bản phát hành mới ${{ github.ref_name }} 🎉
            
            Xem chi tiết danh sách thay đổi và lịch sử commit trên GitHub.
            
            ### 📦 Tệp đính kèm (Assets)
            * **RockyFilmTV-${{ github.ref_name }}.apk**: Tải xuống và cài đặt trực tiếp trên Android TV / Google TV.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
